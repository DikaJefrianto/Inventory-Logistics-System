server:
  port: 8080 # API Gateway berjalan di port utama 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # 1. Konfigurasi Global CORS (Mengizinkan Frontend React.js mengakses API)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000" # URL aplikasi React.js Anda nantinya
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"
            
      # 2. Definisi Routing (Pengalihan URL ke Microservice tujuan)
      routes:
        # Menghubungkan ke Inventory Service
        - id: inventory-service
          uri: http://localhost:8081 # Alamat port inventory-service
          predicates:
            - Path=/api/v1/inventory/** # Semua request dengan pola URL ini akan diteruskan ke port 8081